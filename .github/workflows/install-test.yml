name: install-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-test:
    name: bootstrap + pipeline (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv (for build + tool install)
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"

      - name: Set up Node.js (for claude plugin validate)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin manifest + frontmatter
        # Catches plugin.json schema errors, malformed SKILL.md / agent
        # frontmatter, and bad hooks/hooks.json before they hit users.
        run: claude plugin validate .

      - name: Stale-reference grep guard
        # The skill folder rename (old name -> skills/diagnose/) and the
        # slash-command suffix change must not leave any dangling references
        # in user-facing files. The pattern is split across two strings so
        # this workflow's grep step doesn't match itself.
        run: |
          PATTERN="skills/causal-decision""-debugger|:causal-decision""-debugger"
          if rg -n -e "$PATTERN" -- README.md CLAUDE.md skills/ agents/; then
            echo "::error::stale references to the old skill folder name detected"
            exit 1
          fi

      - name: Build wheel
        run: uv build --wheel --out-dir dist

      - name: Verify vendor manifest matches freshly built wheel
        run: |
          python <<'PY'
          import hashlib, json, sys, zipfile
          from pathlib import Path

          built = next(Path("dist").glob("causal_debugger-*.whl"))
          vendored = Path("skills/diagnose/vendor") / built.name
          manifest_path = Path("skills/diagnose/vendor/manifest.json")
          if not vendored.exists():
              sys.exit(f"missing vendored wheel: {vendored}")
          if not manifest_path.exists():
              sys.exit(f"missing manifest: {manifest_path}")

          manifest = json.loads(manifest_path.read_text())

          def metadata_hash(wheel: Path) -> str:
              with zipfile.ZipFile(wheel) as zf:
                  meta = next(n for n in zf.namelist() if n.endswith(".dist-info/METADATA"))
                  raw = zf.read(meta).decode("utf-8")
                  norm = "\n".join(line.rstrip() for line in raw.splitlines()).strip() + "\n"
                  return hashlib.sha256(norm.encode("utf-8")).hexdigest()

          def payload_hash(wheel: Path) -> str:
              # Deterministic hash of the package payload (causal_debugger/*) to catch
              # code-only changes that leave METADATA byte-identical. Excludes .dist-info
              # because RECORD/WHEEL/timestamps can shift between rebuilds.
              with zipfile.ZipFile(wheel) as zf:
                  names = sorted(
                      n for n in zf.namelist()
                      if n.startswith("causal_debugger/") and not n.endswith("/")
                  )
                  h = hashlib.sha256()
                  for n in names:
                      h.update(n.encode("utf-8"))
                      h.update(b"\0")
                      h.update(zf.read(n))
                      h.update(b"\0")
                  return h.hexdigest()

          built_meta = metadata_hash(built)
          vendor_meta = metadata_hash(vendored)
          built_payload = payload_hash(built)
          vendor_payload = payload_hash(vendored)
          built_sha = hashlib.sha256(built.read_bytes()).hexdigest()
          vendor_sha = hashlib.sha256(vendored.read_bytes()).hexdigest()

          errors = []
          if manifest.get("metadata_sha256") != built_meta:
              errors.append(f"metadata_sha256 mismatch:\n  manifest:    {manifest.get('metadata_sha256')}\n  fresh build: {built_meta}")
          if manifest.get("metadata_sha256") != vendor_meta:
              errors.append("vendored wheel METADATA differs from manifest")
          if manifest.get("sha256") != vendor_sha:
              errors.append("vendored wheel sha256 differs from manifest")
          if manifest.get("payload_sha256") != vendor_payload:
              errors.append(
                  f"payload_sha256 mismatch (vendor):\n  manifest: {manifest.get('payload_sha256')}\n  vendor:   {vendor_payload}"
              )
          if vendor_payload != built_payload:
              errors.append(
                  f"vendored wheel payload differs from fresh build:\n  vendor: {vendor_payload}\n  build:  {built_payload}"
              )
          # built_sha may legitimately differ from vendor_sha if hatchling timestamps shift,
          # so we require METADATA + payload equivalence rather than full-wheel sha equality.
          if errors:
              print("\n".join(errors), file=sys.stderr)
              print("\nSrc changed without re-bundling: rebuild and update manifest.json.", file=sys.stderr)
              print(f"  fresh build sha:  {built_sha}", file=sys.stderr)
              print(f"  vendored sha:     {vendor_sha}", file=sys.stderr)
              sys.exit(1)
          print("manifest matches vendor wheel; METADATA + payload match fresh build.")
          PY

      - name: Stage plugin into a clean directory
        # Mirror examples/ exactly because the example causal_spec.yaml hardcodes
        # `local_path: examples/onboarding_retention/data/observational.parquet`.
        # ``bin/`` must be staged so the bin/causal-debugger shim is on PATH after
        # the bootstrap step finishes.
        run: |
          mkdir -p "${RUNNER_TEMP}/plugin-test/examples"
          cp -r skills agents bin .claude-plugin "${RUNNER_TEMP}/plugin-test/"
          cp -r examples/onboarding_retention "${RUNNER_TEMP}/plugin-test/examples/"
          chmod +x "${RUNNER_TEMP}/plugin-test/bin/causal-debugger"

      - name: Confirm clean env (no causal_debugger preinstalled)
        run: |
          python -c "
          try:
              import causal_debugger
              raise SystemExit(f'unexpected: causal_debugger already present at {causal_debugger.__file__}')
          except ImportError:
              print('clean env confirmed')
          "

      - name: Run bootstrap (installs into isolated venv under CLAUDE_PLUGIN_DATA)
        env:
          # ${CLAUDE_PLUGIN_DATA} is set by Claude Code at runtime to a per-plugin
          # persistent data dir; in CI we set it manually to a tmpdir so the
          # bootstrap installs into the same path the bin/causal-debugger shim
          # will resolve.
          CLAUDE_PLUGIN_DATA: ${{ runner.temp }}/plugin-data
        run: python "${RUNNER_TEMP}/plugin-test/skills/diagnose/scripts/bootstrap.py"

      - name: Confirm bin/ shim is executable and venv binary exists
        env:
          CLAUDE_PLUGIN_DATA: ${{ runner.temp }}/plugin-data
        run: |
          test -x "${RUNNER_TEMP}/plugin-test/bin/causal-debugger"
          test -x "${CLAUDE_PLUGIN_DATA}/venv/bin/causal-debugger"
          test -f "${CLAUDE_PLUGIN_DATA}/install_manifest.json"

      - name: Add bin/ shim to PATH
        run: echo "${RUNNER_TEMP}/plugin-test/bin" >> "$GITHUB_PATH"

      - name: causal-debugger --version (via bin/ shim)
        env:
          CLAUDE_PLUGIN_DATA: ${{ runner.temp }}/plugin-data
        run: causal-debugger --version

      - name: causal-debugger doctor
        env:
          CLAUDE_PLUGIN_DATA: ${{ runner.temp }}/plugin-data
        run: causal-debugger doctor

      - name: Generate example data
        # The example parquet is gitignored, so regenerate. generate_synthetic.py
        # imports causal_debugger which only lives in the plugin venv, so invoke
        # it with that venv's python (reported by `causal-debugger doctor`).
        working-directory: ${{ runner.temp }}/plugin-test
        env:
          CLAUDE_PLUGIN_DATA: ${{ runner.temp }}/plugin-data
        run: |
          VENV_PY=$(causal-debugger doctor | python -c "import json,sys; print(json.load(sys.stdin)['python_executable'])")
          echo "venv python: $VENV_PY"
          "$VENV_PY" examples/onboarding_retention/generate_synthetic.py

      - name: Run pipeline end-to-end
        working-directory: ${{ runner.temp }}/plugin-test
        env:
          CLAUDE_PLUGIN_DATA: ${{ runner.temp }}/plugin-data
        run: causal-debugger pipeline examples/onboarding_retention

      - name: Confirm report artifacts
        working-directory: ${{ runner.temp }}/plugin-test
        run: |
          test -f examples/onboarding_retention/report.md
          test -f examples/onboarding_retention/method_plan.json
          grep -q "Effect estimate\|Estimate\|ATE" examples/onboarding_retention/report.md

      - name: Confirm bootstrap is idempotent on second run
        env:
          CLAUDE_PLUGIN_DATA: ${{ runner.temp }}/plugin-data
        run: |
          python "${RUNNER_TEMP}/plugin-test/skills/diagnose/scripts/bootstrap.py" 2>&1 | tee /tmp/bootstrap2.log
          grep -q "already installed" /tmp/bootstrap2.log
