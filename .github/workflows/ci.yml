name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.14 intentionally omitted: pyproject caps scipy<1.16 and scikit-learn<1.7
        # (forced by dowhy 0.14 / econml 0.16 upstream pins). Those capped versions
        # do not reliably ship cp314 wheels yet. Revisit when the upstream caps lift.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          # Per-version suffix so matrix legs don't clobber each other's wheel cache.
          cache-suffix: py${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: pytest
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml
